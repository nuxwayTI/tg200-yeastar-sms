
services:
  - type: web
    name: tg200-yeastar-sms
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        sync: false
      - key: YEASTAR_WEBHOOK_URL
        sync: false
